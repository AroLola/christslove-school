backend:
  name: github
  repo: AroLola/christslove-school
  branch: main
  auth_type: pkce

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    folder: "/"
    extension: "html"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
