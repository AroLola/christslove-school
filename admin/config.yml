backend:
  name: github
  repo: your-github-username/your-repo-name # Replace with your details
  branch: main # Or your deployment branch

media_folder: "images/uploads" # Where uploaded images will save
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts" # The folder where your posts are stored
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
